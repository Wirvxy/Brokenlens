<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BrokenLens">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="apple-touch-icon" sizes="256x256" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>BrokenLens</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ---- SETUP SCREEN ---- */
  .setup-screen {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 20px;
    padding-top: max(60px, env(safe-area-inset-top));
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }

  .setup-screen h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .setup-screen p {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 24px;
    line-height: 1.4;
  }

  .setup-step {
    font-size: 13px;
    color: #f5c518;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .camera-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .camera-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    border-radius: 14px;
    border: 2px solid #333;
    background: #1a1a1a;
    cursor: pointer;
    transition: all 0.2s;
  }

  .camera-item.testing {
    border-color: #f5c518;
    background: rgba(245,197,24,0.08);
  }

  .camera-item.broken {
    border-color: #ff4444;
    background: rgba(255,68,68,0.08);
  }

  .camera-item.working {
    border-color: #44cc44;
    background: rgba(68,204,68,0.08);
  }

  .cam-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .camera-item.broken .cam-icon { background: rgba(255,68,68,0.2); }
  .camera-item.working .cam-icon { background: rgba(68,204,68,0.2); }

  .cam-info { flex: 1; min-width: 0; }

  .cam-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .cam-label {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .cam-status {
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .camera-item.broken .cam-status { color: #ff4444; }
  .camera-item.working .cam-status { color: #44cc44; }

  .setup-preview {
    width: 100%;
    height: 180px;
    border-radius: 14px;
    overflow: hidden;
    background: #111;
    margin-bottom: 16px;
    position: relative;
  }

  .setup-preview video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .setup-preview-label {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding: 4px 12px;
    border-radius: 10px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
  }

  .setup-actions { display: flex; gap: 10px; }

  .setup-btn {
    flex: 1;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .setup-btn:active { transform: scale(0.97); }

  .btn-broken {
    background: rgba(255,68,68,0.15);
    color: #ff6666;
    border: 2px solid #ff4444;
  }

  .btn-working {
    background: rgba(68,204,68,0.15);
    color: #66cc66;
    border: 2px solid #44cc44;
  }

  .btn-done {
    background: #f5c518;
    color: #000;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: transform 0.1s;
  }

  .btn-done:active { transform: scale(0.97); }
  .btn-done:disabled { opacity: 0.3; }

  .btn-reset {
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    cursor: pointer;
    padding: 8px;
    margin-top: 8px;
    width: 100%;
    text-align: center;
  }

  /* ---- CAMERA SCREEN ---- */
  .camera-screen {
    height: 100%;
    display: none;
    flex-direction: column;
  }

  .camera-screen.active { display: flex; }

  .viewfinder {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #111;
  }

  .viewfinder video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .controls {
    background: #1a1a1a;
    padding: 20px 16px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .lens-row {
    display: flex;
    justify-content: center;
    gap: 12px;
  }

  .lens-btn {
    min-width: 56px;
    height: 56px;
    padding: 0 14px;
    border-radius: 28px;
    border: 2px solid #555;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lens-btn.active {
    border-color: #f5c518;
    background: rgba(245,197,24,0.2);
    color: #f5c518;
  }

  .action-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }

  .flip-btn, .settings-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.15);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .flip-btn svg, .settings-btn svg { width: 24px; height: 24px; }

  .shutter-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 4px solid #fff;
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s;
  }

  .shutter-btn::after {
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.1s;
  }

  .shutter-btn:active::after { transform: scale(0.85); }

  .flash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.05s;
  }

  .flash.active { opacity: 0.8; }

  .preview-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.95);
    z-index: 200;
    display: none;
    flex-direction: column;
  }

  .preview-overlay.active { display: flex; }

  .preview-top {
    display: flex;
    justify-content: flex-end;
    padding: 16px;
    padding-top: max(16px, env(safe-area-inset-top));
  }

  .close-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview-image-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .preview-image-container img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 8px;
  }

  .preview-bottom {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 20px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }

  .save-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    border-radius: 50px;
    border: none;
    background: #f5c518;
    color: #000;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }

  .save-btn svg { width: 20px; height: 20px; fill: #000; }

  .share-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid #555;
    background: transparent;
    cursor: pointer;
  }

  .share-btn svg { width: 22px; height: 22px; fill: #fff; }

  .status-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    z-index: 10;
  }

  .status-text {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    font-weight: 500;
  }

  .toast {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(50,50,50,0.95);
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ========== SETUP SCREEN ========== -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-step">Setup</div>
  <h1>Which lens is broken?</h1>
  <p>Tap each camera to preview it. Mark the broken one(s) so we can skip them.</p>

  <div class="setup-preview" id="setupPreview">
    <video id="setupVideo" autoplay playsinline muted></video>
    <div class="setup-preview-label" id="setupPreviewLabel">Tap a camera to preview</div>
  </div>

  <div class="camera-list" id="cameraList"></div>

  <div class="setup-actions" id="setupMarkBtns" style="display:none; margin-bottom: 12px;">
    <button class="setup-btn btn-broken" id="markBroken">Broken</button>
    <button class="setup-btn btn-working" id="markWorking">Working</button>
  </div>

  <button class="btn-done" id="doneBtn" disabled>Start Camera</button>
  <button class="btn-reset" id="resetBtn" style="display:none">Reset setup</button>
</div>

<!-- ========== CAMERA SCREEN ========== -->
<div class="camera-screen" id="cameraScreen">
  <div class="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <div class="status-bar">
      <span class="status-text" id="statusText"></span>
      <span class="status-text" id="resText"></span>
    </div>
  </div>

  <div class="controls">
    <div class="lens-row" id="lensRow"></div>
    <div class="action-row">
      <button class="flip-btn" id="flipBtn" title="Flip camera">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
          <path d="M16 3h5v5M4 20L21 3M8 21H3v-5M20 4L3 21"/>
        </svg>
      </button>
      <button class="shutter-btn" id="shutterBtn" title="Take photo"></button>
      <button class="settings-btn" id="settingsBtn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="flash" id="flash"></div>

<div class="preview-overlay" id="preview">
  <div class="preview-top">
    <button class="close-btn" id="closePreview">&times;</button>
  </div>
  <div class="preview-image-container">
    <img id="previewImg" src="" alt="Photo">
  </div>
  <div class="preview-bottom">
    <button class="save-btn" id="saveBtn">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      Save
    </button>
    <button class="share-btn" id="shareBtn">
      <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
const STORAGE_KEY = 'brokenlens_config';

let allCameras = [];
let uniqueCameras = [];
let setupStream = null;
let selectedCamIdx = -1;
let cameraStates = {};

let currentStream = null;
let currentBlob = null;
let activeDeviceId = null;
let isFront = false;
let workingBackCameras = [];
let workingFrontCameras = [];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function getSavedConfig() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); }
  catch { return null; }
}

function saveConfig(config) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
}

function clearConfig() {
  localStorage.removeItem(STORAGE_KEY);
}

function isFrontCamera(label) {
  const l = (label || '').toLowerCase();
  return l.includes('front') || l.includes('facetime') || l.includes('user') || l.includes('truedepth');
}

function deduplicateCameras(cameras) {
  const groups = new Map();

  for (const cam of cameras) {
    const label = (cam.label || '').toLowerCase().trim();
    const facing = isFrontCamera(cam.label) ? 'front' : 'back';

    let groupKey;
    if (label.includes('ultra') || label.includes('0.5')) {
      groupKey = 'back-ultrawide';
    } else if (label.includes('tele') || label.includes('zoom')) {
      groupKey = 'back-telephoto';
    } else if (facing === 'front') {
      groupKey = 'front';
    } else {
      const backCams = cameras.filter(c => !isFrontCamera(c.label));
      const idx = backCams.indexOf(cam);
      groupKey = `back-${idx}`;
    }

    if (!groups.has(groupKey)) {
      groups.set(groupKey, []);
    }
    groups.get(groupKey).push(cam);
  }

  const result = [];
  for (const [key, cams] of groups) {
    cams.sort((a, b) => {
      const labelA = (a.label || '').toLowerCase();
      const labelB = (b.label || '').toLowerCase();
      const hasResA = labelA.match(/\d{3,4}x\d{3,4}/) || labelA.includes('high') || labelA.includes('4k');
      const hasResB = labelB.match(/\d{3,4}x\d{3,4}/) || labelB.includes('high') || labelB.includes('4k');
      if (hasResA && !hasResB) return -1;
      if (!hasResA && hasResB) return 1;
      return 0;
    });
    result.push(cams[0]);
  }

  return result;
}

function getPhysicalCameras(cameras) {
  const fronts = cameras.filter(c => isFrontCamera(c.label));
  const backs = cameras.filter(c => !isFrontCamera(c.label));

  const dedupedFronts = deduplicateByPosition(fronts);
  const dedupedBacks = deduplicateByPosition(backs);

  return [...dedupedBacks, ...dedupedFronts];
}

function deduplicateByPosition(cameras) {
  if (cameras.length <= 1) return cameras;

  const seen = new Map();
  for (const cam of cameras) {
    const label = (cam.label || '').toLowerCase();
    const cleaned = label.replace(/\s*\(.*?\)\s*/g, '').replace(/\d{3,4}x\d{3,4}/g, '').replace(/high|low|medium/gi, '').trim();

    if (!seen.has(cleaned)) {
      seen.set(cleaned, cam);
    }
  }

  if (seen.size === cameras.length && cameras.length > 3) {
    const unique = [];
    const labels = new Set();
    for (const cam of cameras) {
      const base = (cam.label || '').split('(')[0].trim().toLowerCase();
      if (!labels.has(base)) {
        labels.add(base);
        unique.push(cam);
      }
    }
    return unique.length > 0 ? unique : [cameras[0]];
  }

  return [...seen.values()];
}

function getCameraDisplayName(cam, allCams) {
  if (isFrontCamera(cam.label)) return 'Front Camera';

  const backCams = allCams.filter(c => !isFrontCamera(c.label));
  const backIdx = backCams.indexOf(cam);

  if (backCams.length === 1) return 'Main Camera (1x)';

  const label = (cam.label || '').toLowerCase();
  if (label.includes('ultra') || label.includes('0.5')) return 'Ultra Wide (0.5x)';
  if (label.includes('tele') || label.includes('zoom')) return 'Telephoto (3x)';

  if (backCams.length === 3) {
    if (backIdx === 0) return 'Ultra Wide (0.5x)';
    if (backIdx === 1) return 'Main Camera (1x)';
    if (backIdx === 2) return 'Telephoto (3x)';
  }
  if (backCams.length === 2) {
    if (backIdx === 0) return 'Main Camera (1x)';
    if (backIdx === 1) return 'Ultra Wide (0.5x)';
  }

  return `Back Camera ${backIdx + 1}`;
}

function getCameraShortName(cam, allWorking) {
  if (isFrontCamera(cam.label)) return 'Front';
  const backs = allWorking.filter(c => !isFrontCamera(c.label));
  if (backs.length === 1) return 'Back';

  const label = (cam.label || '').toLowerCase();
  if (label.includes('ultra') || label.includes('0.5')) return '0.5x';
  if (label.includes('tele') || label.includes('zoom')) return '3x';

  const allBacks = uniqueCameras.filter(c => !isFrontCamera(c.label));
  const globalIdx = allBacks.indexOf(cam);
  if (allBacks.length === 3) {
    if (globalIdx === 0) return '0.5x';
    if (globalIdx === 1) return '1x';
    if (globalIdx === 2) return '3x';
  }

  const idx = backs.indexOf(cam);
  return `Cam ${idx + 1}`;
}

async function enumerateAllCameras() {
  try {
    const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
    tempStream.getTracks().forEach(t => t.stop());
  } catch { return []; }
  const devices = await navigator.mediaDevices.enumerateDevices();
  return devices.filter(d => d.kind === 'videoinput');
}

// ============ SETUP ============

async function startSetup() {
  const setupScreen = document.getElementById('setupScreen');
  const cameraList = document.getElementById('cameraList');
  setupScreen.style.display = 'flex';
  document.getElementById('cameraScreen').classList.remove('active');

  allCameras = await enumerateAllCameras();

  if (allCameras.length === 0) {
    cameraList.innerHTML = '<p style="text-align:center;color:#ff4444;padding:40px">No cameras detected. Please allow camera access and reload.</p>';
    return;
  }

  uniqueCameras = getPhysicalCameras(allCameras);
  cameraStates = {};
  uniqueCameras.forEach(cam => { cameraStates[cam.deviceId] = 'unknown'; });

  renderCameraList();
  updateDoneButton();
}

function renderCameraList() {
  const cameraList = document.getElementById('cameraList');
  cameraList.innerHTML = '';

  uniqueCameras.forEach((cam, i) => {
    const state = cameraStates[cam.deviceId];
    const div = document.createElement('div');
    div.className = 'camera-item' + (selectedCamIdx === i ? ' testing' : '') + (state === 'broken' ? ' broken' : '') + (state === 'working' ? ' working' : '');

    const icon = isFrontCamera(cam.label) ? '🤳' : '📷';
    const statusText = state === 'broken' ? 'BROKEN' : state === 'working' ? 'OK' : 'Tap to test';

    div.innerHTML = `
      <div class="cam-icon">${icon}</div>
      <div class="cam-info">
        <div class="cam-name">${getCameraDisplayName(cam, uniqueCameras)}</div>
        <div class="cam-label">${cam.label || 'Unknown'}</div>
      </div>
      <span class="cam-status">${statusText}</span>
    `;

    div.addEventListener('click', () => selectCameraForTest(i));
    cameraList.appendChild(div);
  });
}

async function selectCameraForTest(index) {
  selectedCamIdx = index;
  const cam = uniqueCameras[index];

  const setupVideo = document.getElementById('setupVideo');
  const label = document.getElementById('setupPreviewLabel');
  const markBtns = document.getElementById('setupMarkBtns');

  if (setupStream) {
    setupStream.getTracks().forEach(t => t.stop());
    setupStream = null;
  }

  label.textContent = 'Loading...';
  markBtns.style.display = 'flex';

  try {
    setupStream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: { exact: cam.deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    setupVideo.srcObject = setupStream;
    label.textContent = getCameraDisplayName(cam, uniqueCameras);
  } catch {
    label.textContent = 'Could not access this camera';
  }

  renderCameraList();
}

function markCamera(state) {
  if (selectedCamIdx < 0) return;
  const cam = uniqueCameras[selectedCamIdx];
  cameraStates[cam.deviceId] = state;
  renderCameraList();
  updateDoneButton();
}

function updateDoneButton() {
  const allMarked = uniqueCameras.every(cam => cameraStates[cam.deviceId] !== 'unknown');
  const hasWorking = uniqueCameras.some(cam => cameraStates[cam.deviceId] === 'working');
  const doneBtn = document.getElementById('doneBtn');

  if (allMarked && hasWorking) {
    doneBtn.disabled = false;
    doneBtn.textContent = 'Start Camera';
  } else if (allMarked && !hasWorking) {
    doneBtn.disabled = true;
    doneBtn.textContent = 'Mark at least one as working';
  } else {
    const remaining = uniqueCameras.filter(cam => cameraStates[cam.deviceId] === 'unknown').length;
    doneBtn.disabled = true;
    doneBtn.textContent = `${remaining} camera(s) left to mark`;
  }
}

function finishSetup() {
  if (setupStream) {
    setupStream.getTracks().forEach(t => t.stop());
    setupStream = null;
  }

  const config = {
    broken: uniqueCameras.filter(c => cameraStates[c.deviceId] === 'broken').map(c => c.deviceId),
    working: uniqueCameras.filter(c => cameraStates[c.deviceId] === 'working').map(c => c.deviceId),
    timestamp: Date.now()
  };
  saveConfig(config);
  launchCamera(config);
}

// ============ CAMERA ============

async function launchCamera(config) {
  document.getElementById('setupScreen').style.display = 'none';
  const camScreen = document.getElementById('cameraScreen');
  camScreen.classList.add('active');
  document.getElementById('resetBtn').style.display = 'block';

  if (allCameras.length === 0) {
    allCameras = await enumerateAllCameras();
    uniqueCameras = getPhysicalCameras(allCameras);
  }

  const workingIds = new Set(config.working);

  workingBackCameras = uniqueCameras.filter(c => workingIds.has(c.deviceId) && !isFrontCamera(c.label));
  workingFrontCameras = uniqueCameras.filter(c => workingIds.has(c.deviceId) && isFrontCamera(c.label));

  isFront = false;
  const startCam = workingBackCameras[0] || workingFrontCameras[0];
  if (workingBackCameras.length === 0 && workingFrontCameras.length > 0) isFront = true;

  if (startCam) await switchCamera(startCam.deviceId);
  buildLensButtons();
}

function buildLensButtons() {
  const lensRow = document.getElementById('lensRow');
  lensRow.innerHTML = '';
  const cameras = isFront ? workingFrontCameras : workingBackCameras;

  cameras.forEach(cam => {
    const btn = document.createElement('button');
    btn.className = 'lens-btn' + (cam.deviceId === activeDeviceId ? ' active' : '');
    btn.textContent = getCameraShortName(cam, cameras);
    btn.addEventListener('click', () => switchCamera(cam.deviceId));
    lensRow.appendChild(btn);
  });
}

async function switchCamera(deviceId) {
  if (deviceId === activeDeviceId) return;

  const statusText = document.getElementById('statusText');
  statusText.textContent = 'Switching...';

  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
  }

  try {
    currentStream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: { exact: deviceId }, width: { ideal: 3840 }, height: { ideal: 2160 } },
      audio: false
    });
    document.getElementById('video').srcObject = currentStream;
    activeDeviceId = deviceId;

    const track = currentStream.getVideoTracks()[0];
    const settings = track.getSettings();
    const cam = uniqueCameras.find(c => c.deviceId === deviceId);
    const allWorking = isFront ? workingFrontCameras : workingBackCameras;
    statusText.textContent = cam ? getCameraShortName(cam, allWorking) : 'Ready';
    document.getElementById('resText').textContent = `${settings.width || '?'}x${settings.height || '?'}`;

    buildLensButtons();
  } catch {
    statusText.textContent = 'Error';
    showToast('Could not access this camera');
  }
}

function takePhoto() {
  const track = currentStream?.getVideoTracks()[0];
  if (!track) return;

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const settings = track.getSettings();
  canvas.width = settings.width || video.videoWidth;
  canvas.height = settings.height || video.videoHeight;

  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const flash = document.getElementById('flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 150);

  canvas.toBlob(blob => {
    if (!blob) return;
    currentBlob = blob;
    document.getElementById('previewImg').src = URL.createObjectURL(blob);
    document.getElementById('preview').classList.add('active');
  }, 'image/jpeg', 0.95);
}

function savePhoto() {
  if (!currentBlob) return;
  if (navigator.share && navigator.canShare) {
    const file = new File([currentBlob], `photo_${Date.now()}.jpg`, { type: 'image/jpeg' });
    if (navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file] }).catch(() => fallbackSave());
      return;
    }
  }
  fallbackSave();
}

function fallbackSave() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(currentBlob);
  a.download = `photo_${Date.now()}.jpg`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('Photo saved');
}

function sharePhoto() {
  if (!currentBlob) return;
  const file = new File([currentBlob], `photo_${Date.now()}.jpg`, { type: 'image/jpeg' });
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file], title: 'Photo' }).catch(() => {});
  } else {
    fallbackSave();
  }
}

// ============ EVENT LISTENERS ============

document.getElementById('markBroken').addEventListener('click', () => markCamera('broken'));
document.getElementById('markWorking').addEventListener('click', () => markCamera('working'));
document.getElementById('doneBtn').addEventListener('click', finishSetup);

document.getElementById('resetBtn').addEventListener('click', () => {
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
  activeDeviceId = null;
  selectedCamIdx = -1;
  clearConfig();
  startSetup();
});

document.getElementById('settingsBtn').addEventListener('click', () => {
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
  activeDeviceId = null;
  selectedCamIdx = -1;
  clearConfig();
  startSetup();
});

document.getElementById('shutterBtn').addEventListener('click', takePhoto);

document.getElementById('flipBtn').addEventListener('click', () => {
  if (isFront && workingBackCameras.length === 0) return;
  if (!isFront && workingFrontCameras.length === 0) return;
  isFront = !isFront;
  const cameras = isFront ? workingFrontCameras : workingBackCameras;
  if (cameras.length > 0) switchCamera(cameras[0].deviceId);
});

document.getElementById('closePreview').addEventListener('click', () => {
  const preview = document.getElementById('preview');
  const previewImg = document.getElementById('previewImg');
  preview.classList.remove('active');
  if (previewImg.src.startsWith('blob:')) URL.revokeObjectURL(previewImg.src);
  currentBlob = null;
});

document.getElementById('saveBtn').addEventListener('click', savePhoto);
document.getElementById('shareBtn').addEventListener('click', sharePhoto);

// ============ INIT ============

async function init() {
  const config = getSavedConfig();
  if (config && config.working && config.working.length > 0) {
    allCameras = await enumerateAllCameras();
    uniqueCameras = getPhysicalCameras(allCameras);
    const currentIds = new Set(uniqueCameras.map(c => c.deviceId));
    const configStillValid = config.working.every(id => currentIds.has(id));

    if (configStillValid) {
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('resetBtn').style.display = 'block';
      launchCamera(config);
      return;
    }
  }
  startSetup();
}

init();
</script>
