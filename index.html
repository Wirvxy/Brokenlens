<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BrokenLens">
<link rel="apple-touch-icon" href="cam-icon.png">
<link rel="manifest" href="manifest.json">
<title>BrokenLens</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ---- SETUP SCREEN ---- */
  .setup-screen {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 20px;
    padding-top: max(60px, env(safe-area-inset-top));
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }

  .setup-screen h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }

  .setup-screen p {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 24px;
    line-height: 1.4;
  }

  .setup-step {
    font-size: 13px;
    color: #f5c518;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .camera-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .camera-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    border-radius: 14px;
    border: 2px solid #333;
    background: #1a1a1a;
    cursor: pointer;
    transition: all 0.2s;
  }

  .camera-item.testing { border-color: #f5c518; background: rgba(245,197,24,0.08); }
  .camera-item.broken { border-color: #ff4444; background: rgba(255,68,68,0.08); }
  .camera-item.working { border-color: #44cc44; background: rgba(68,204,68,0.08); }

  .cam-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  .camera-item.broken .cam-icon { background: rgba(255,68,68,0.2); }
  .camera-item.working .cam-icon { background: rgba(68,204,68,0.2); }
  .cam-info { flex: 1; min-width: 0; }

  .cam-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }

  .cam-label {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  .cam-status { font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .camera-item.broken .cam-status { color: #ff4444; }
  .camera-item.working .cam-status { color: #44cc44; }

  .setup-preview {
    width: 100%; height: 180px;
    border-radius: 14px; overflow: hidden;
    background: #111; margin-bottom: 16px; position: relative;
  }

  .setup-preview video { width: 100%; height: 100%; object-fit: cover; }
  .setup-preview video.mirrored { transform: scaleX(-1); }

  .setup-preview-label {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); padding: 4px 12px;
    border-radius: 10px; font-size: 12px; color: rgba(255,255,255,0.7);
  }

  .setup-actions { display: flex; gap: 10px; }

  .setup-btn {
    flex: 1; padding: 16px; border-radius: 14px; border: none;
    font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s;
  }

  .setup-btn:active { transform: scale(0.97); }
  .btn-broken { background: rgba(255,68,68,0.15); color: #ff6666; border: 2px solid #ff4444; }
  .btn-working { background: rgba(68,204,68,0.15); color: #66cc66; border: 2px solid #44cc44; }

  .btn-done {
    background: #f5c518; color: #000; padding: 16px;
    border-radius: 14px; border: none; font-size: 17px; font-weight: 700;
    cursor: pointer; width: 100%; transition: transform 0.1s;
  }

  .btn-done:active { transform: scale(0.97); }
  .btn-done:disabled { opacity: 0.3; }

  .btn-reset {
    background: none; border: none; color: rgba(255,255,255,0.4);
    font-size: 13px; cursor: pointer; padding: 8px;
    margin-top: 8px; width: 100%; text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  /* ---- CAMERA SCREEN ---- */
  .camera-screen { height: 100%; display: none; flex-direction: column; }
  .camera-screen.active { display: flex; }

  .viewfinder { flex: 1; position: relative; overflow: hidden; background: #111; }

  .viewfinder video { width: 100%; height: 100%; object-fit: cover; }
  .viewfinder video.mirrored { transform: scaleX(-1); }

  /* Grid overlay */
  .grid-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 5; display: none;
  }

  .grid-overlay.active { display: block; }

  .grid-overlay::before, .grid-overlay::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.25);
  }

  .grid-overlay::before {
    top: 0; bottom: 0;
    left: 33.33%; width: 1px;
    box-shadow: 33.33% 0 0 rgba(255,255,255,0.25);
  }

  .grid-overlay::after {
    left: 0; right: 0;
    top: 33.33%; height: 1px;
    box-shadow: 0 33.33% 0 rgba(255,255,255,0.25);
  }

  /* Flash toggle */
  .flash-btn {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.15); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: absolute;
    top: max(12px, env(safe-area-inset-top));
    right: 16px; z-index: 20;
  }

  .flash-btn.flash-on { background: rgba(245,197,24,0.3); border: 2px solid #f5c518; }
  .flash-btn svg { width: 22px; height: 22px; }

  /* Timer indicator */
  .timer-indicator {
    position: absolute;
    top: max(12px, env(safe-area-inset-top));
    left: 50%; transform: translateX(-50%);
    background: rgba(245,197,24,0.9);
    color: #000; font-size: 28px; font-weight: 700;
    width: 60px; height: 60px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    z-index: 50;
  }

  .timer-indicator.active { display: flex; }

  .controls {
    background: #1a1a1a; padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 12px;
  }

  /* Mode row: Photo / Video */
  .mode-row {
    display: flex; justify-content: center; gap: 6px;
  }

  .mode-btn {
    padding: 6px 18px; border-radius: 20px; border: none;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5);
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }

  .mode-btn.active { background: #f5c518; color: #000; }

  .lens-row { display: flex; justify-content: center; gap: 12px; }

  .lens-btn {
    min-width: 56px; height: 56px; padding: 0 14px;
    border-radius: 28px; border: 2px solid #555;
    background: rgba(255,255,255,0.1); color: #fff;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  }

  .lens-btn.active { border-color: #f5c518; background: rgba(245,197,24,0.2); color: #f5c518; }

  .action-row {
    display: flex; align-items: center;
    justify-content: space-between; padding: 0 20px;
  }

  .icon-btn {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.15); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .icon-btn svg { width: 24px; height: 24px; }

  /* Toggles row: grid + timer */
  .toggle-row {
    display: flex; justify-content: center; gap: 12px;
  }

  .toggle-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px; border: 2px solid #444;
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5);
    font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }

  .toggle-btn svg { width: 14px; height: 14px; }

  .toggle-btn.active {
    border-color: #f5c518; background: rgba(245,197,24,0.15); color: #f5c518;
  }

  /* Shutter button — changes for video */
  .shutter-btn {
    width: 72px; height: 72px; border-radius: 50%;
    border: 4px solid #fff; background: transparent;
    cursor: pointer; position: relative; transition: all 0.2s;
  }

  .shutter-btn::after {
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border-radius: 50%; background: #fff; transition: all 0.2s;
  }

  .shutter-btn:active::after { transform: scale(0.85); }

  .shutter-btn.video-mode::after { background: #ff4444; border-radius: 50%; }
  .shutter-btn.recording { border-color: #ff4444; }
  .shutter-btn.recording::after { background: #ff4444; border-radius: 4px; width: 28px; height: 28px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

  /* Recording timer */
  .rec-timer {
    position: absolute;
    top: max(12px, env(safe-area-inset-top));
    left: 16px;
    background: rgba(255,0,0,0.8);
    color: #fff; font-size: 13px; font-weight: 700;
    padding: 4px 10px; border-radius: 10px;
    display: none; align-items: center; gap: 6px; z-index: 20;
  }

  .rec-timer.active { display: flex; }
  .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .flash {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: #fff; opacity: 0; pointer-events: none;
    z-index: 100; transition: opacity 0.05s;
  }

  .flash.active { opacity: 0.8; }

  .preview-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.95); z-index: 200;
    display: none; flex-direction: column;
  }

  .preview-overlay.active { display: flex; }

  .preview-top {
    display: flex; justify-content: flex-end; padding: 16px;
    padding-top: max(16px, env(safe-area-inset-top));
  }

  .close-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.2); color: #fff;
    font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .preview-image-container {
    flex: 1; display: flex; align-items: center;
    justify-content: center; padding: 16px;
  }

  .preview-image-container img, .preview-image-container video {
    max-width: 100%; max-height: 100%; border-radius: 8px;
  }

  .preview-bottom {
    display: flex; justify-content: center; gap: 16px; padding: 20px;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }

  .save-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 32px; border-radius: 50px; border: none;
    background: #f5c518; color: #000; font-size: 16px; font-weight: 600; cursor: pointer;
  }

  .save-btn svg { width: 20px; height: 20px; fill: #000; }

  .share-btn {
    display: flex; align-items: center; justify-content: center;
    width: 50px; height: 50px; border-radius: 50%;
    border: 2px solid #555; background: transparent; cursor: pointer;
  }

  .share-btn svg { width: 22px; height: 22px; fill: #fff; }

  .toast {
    position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
    background: rgba(50,50,50,0.95); color: #fff;
    padding: 10px 20px; border-radius: 20px; font-size: 14px;
    z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }

  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ========== SETUP SCREEN ========== -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-step">Step 1 of 2</div>
  <h1>Which lens is broken?</h1>
  <p>Tap each camera to preview it. Mark the broken one(s) so we can skip them.</p>

  <div class="setup-preview" id="setupPreview">
    <video id="setupVideo" autoplay playsinline muted></video>
    <div class="setup-preview-label" id="setupPreviewLabel">Tap a camera to preview</div>
  </div>

  <div class="camera-list" id="cameraList"></div>

  <div class="setup-actions" id="setupMarkBtns" style="display:none; margin-bottom: 12px;">
    <button class="setup-btn btn-broken" id="markBroken">Broken</button>
    <button class="setup-btn btn-working" id="markWorking">Working</button>
  </div>

  <button class="btn-done" id="doneBtn" disabled>Start Camera</button>
  <button class="btn-reset" id="resetBtn" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
    Settings
  </button>
</div>

<!-- ========== CAMERA SCREEN ========== -->
<div class="camera-screen" id="cameraScreen">
  <div class="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <div class="grid-overlay" id="gridOverlay"></div>
    <div class="timer-indicator" id="timerIndicator">3</div>
    <div class="rec-timer" id="recTimer"><div class="rec-dot"></div><span id="recTime">0:00</span></div>
    <button class="flash-btn" id="flashBtn" title="Toggle flash">
      <svg id="flashIcon" viewBox="0 0 24 24" fill="#fff">
        <path d="M7 2v11h3v9l7-12h-4l4-8z"/>
      </svg>
    </button>
  </div>

  <div class="controls">
    <div class="mode-row">
      <button class="mode-btn active" id="photoModeBtn">Photo</button>
      <button class="mode-btn" id="videoModeBtn">Video</button>
    </div>

    <div class="lens-row" id="lensRow"></div>

    <div class="toggle-row">
      <button class="toggle-btn" id="gridBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3v18M16 3v18M3 8h18M3 16h18"/>
        </svg>
        Grid
      </button>
      <button class="toggle-btn" id="timerBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2M12 5V3M10 3h4"/>
        </svg>
        <span id="timerLabel">Timer: Off</span>
      </button>
    </div>

    <div class="action-row">
      <button class="icon-btn" id="flipBtn" title="Flip camera">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
          <path d="M16 3h5v5M4 20L21 3M8 21H3v-5M20 4L3 21"/>
        </svg>
      </button>
      <button class="shutter-btn" id="shutterBtn"></button>
      <button class="icon-btn" id="settingsBtn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="flash" id="flash"></div>

<div class="preview-overlay" id="preview">
  <div class="preview-top">
    <button class="close-btn" id="closePreview">&times;</button>
  </div>
  <div class="preview-image-container" id="previewContainer">
    <img id="previewImg" src="" alt="Photo">
  </div>
  <div class="preview-bottom">
    <button class="save-btn" id="saveBtn">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      Save
    </button>
    <button class="share-btn" id="shareBtn">
      <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
const STORAGE_KEY = 'brokenlens_config';

const ALLOWED_BACK_INDICES = [0, 2, 5];
const BACK_CAMERA_NAMES = { 0: 'Main (1x)', 2: 'Wide (0.5x)', 5: 'Tele (3x)' };
const LENS_BTN_LABELS = { 0: '1x', 2: '0.5x', 5: '3x' };

let allCameras = [];
let visibleCameras = [];
let setupStream = null;
let selectedCamIdx = -1;
let cameraStates = {};

let currentStream = null;
let currentBlob = null;
let currentVideoBlob = null;
let activeDeviceId = null;
let isFront = false;
let workingBackCameras = [];
let workingFrontCameras = [];

let flashEnabled = false;
let gridEnabled = false;
let timerMode = 0; // 0=off, 3=3s, 10=10s
let timerTimeout = null;

let isVideoMode = false;
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;
let recInterval = null;
let recSeconds = 0;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function getSavedConfig() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
}
function saveConfig(c) { localStorage.setItem(STORAGE_KEY, JSON.stringify(c)); }
function clearConfig() { localStorage.removeItem(STORAGE_KEY); }

function isFrontCamera(label) {
  const l = (label || '').toLowerCase();
  return l.includes('front') || l.includes('facetime') || l.includes('user') || l.includes('truedepth');
}

function getVisibleCameras(all) {
  const front = all.filter(c => isFrontCamera(c.label));
  const back = all.filter(c => !isFrontCamera(c.label));
  const allowedBack = ALLOWED_BACK_INDICES.map(i => back[i]).filter(Boolean);
  return [...front, ...allowedBack];
}

function getDisplayName(cam) {
  if (isFrontCamera(cam.label)) return 'Front Camera';
  const allBack = allCameras.filter(c => !isFrontCamera(c.label));
  const origIdx = allBack.indexOf(cam);
  return BACK_CAMERA_NAMES[origIdx] || 'Back Camera';
}

function getLensBtnLabel(cam) {
  if (isFrontCamera(cam.label)) return 'Front';
  const allBack = allCameras.filter(c => !isFrontCamera(c.label));
  const origIdx = allBack.indexOf(cam);
  return LENS_BTN_LABELS[origIdx] || 'Back';
}

async function enumerateAllCameras() {
  try {
    const s = await navigator.mediaDevices.getUserMedia({ video: true });
    s.getTracks().forEach(t => t.stop());
  } catch { return []; }
  const d = await navigator.mediaDevices.enumerateDevices();
  return d.filter(d => d.kind === 'videoinput');
}

// ============ FLASH ============
function updateFlashButton() {
  const btn = document.getElementById('flashBtn');
  const icon = document.getElementById('flashIcon');
  if (flashEnabled) {
    btn.classList.add('flash-on');
    icon.innerHTML = '<path d="M7 2v11h3v9l7-12h-4l4-8z"/>';
    icon.style.fill = '#f5c518';
  } else {
    btn.classList.remove('flash-on');
    icon.innerHTML = '<path d="M7 2v11h3v9l7-12h-4l4-8z"/><line x1="2" y1="2" x2="22" y2="22" stroke="#fff" stroke-width="2"/>';
    icon.style.fill = '#fff';
  }
}

async function applyTorch(on) {
  if (!currentStream) return;
  const track = currentStream.getVideoTracks()[0];
  if (!track) return;
  const caps = track.getCapabilities();
  if (!caps.torch) return;
  try { await track.applyConstraints({ advanced: [{ torch: on }] }); } catch {}
}

document.getElementById('flashBtn').addEventListener('click', () => {
  flashEnabled = !flashEnabled;
  updateFlashButton();
  applyTorch(flashEnabled);
});

// ============ GRID ============
document.getElementById('gridBtn').addEventListener('click', () => {
  gridEnabled = !gridEnabled;
  document.getElementById('gridOverlay').classList.toggle('active', gridEnabled);
  document.getElementById('gridBtn').classList.toggle('active', gridEnabled);
});

// ============ TIMER ============
const timerCycle = [0, 3, 10];
const timerLabels = ['Timer: Off', 'Timer: 3s', 'Timer: 10s'];

function updateTimerButton() {
  const idx = timerCycle.indexOf(timerMode);
  document.getElementById('timerLabel').textContent = timerLabels[idx];
  document.getElementById('timerBtn').classList.toggle('active', timerMode !== 0);
}

document.getElementById('timerBtn').addEventListener('click', () => {
  const idx = timerCycle.indexOf(timerMode);
  timerMode = timerCycle[(idx + 1) % timerCycle.length];
  updateTimerButton();
});

// ============ MODE (PHOTO/VIDEO) ============
document.getElementById('photoModeBtn').addEventListener('click', () => {
  if (isRecording) return;
  isVideoMode = false;
  document.getElementById('photoModeBtn').classList.add('active');
  document.getElementById('videoModeBtn').classList.remove('active');
  document.getElementById('shutterBtn').classList.remove('video-mode');
  document.getElementById('flashBtn').style.display = isFront ? 'none' : 'flex';
});

document.getElementById('videoModeBtn').addEventListener('click', () => {
  if (isRecording) return;
  isVideoMode = true;
  document.getElementById('videoModeBtn').classList.add('active');
  document.getElementById('photoModeBtn').classList.remove('active');
  document.getElementById('shutterBtn').classList.add('video-mode');
  document.getElementById('flashBtn').style.display = 'none'; // no torch during video on iOS
});

// ============ SETUP ============
async function startSetup() {
  document.getElementById('setupScreen').style.display = 'flex';
  document.getElementById('cameraScreen').classList.remove('active');

  allCameras = await enumerateAllCameras();
  const cameraList = document.getElementById('cameraList');

  if (allCameras.length === 0) {
    cameraList.innerHTML = '<p style="text-align:center;color:#ff4444;padding:40px">No cameras detected.</p>';
    return;
  }

  visibleCameras = getVisibleCameras(allCameras);
  cameraStates = {};
  visibleCameras.forEach(cam => { cameraStates[cam.deviceId] = 'unknown'; });
  renderCameraList();
  updateDoneButton();
}

function renderCameraList() {
  const cameraList = document.getElementById('cameraList');
  cameraList.innerHTML = '';

  visibleCameras.forEach((cam, i) => {
    const state = cameraStates[cam.deviceId];
    const div = document.createElement('div');
    div.className = 'camera-item'
      + (selectedCamIdx === i ? ' testing' : '')
      + (state === 'broken' ? ' broken' : '')
      + (state === 'working' ? ' working' : '');

    const icon = isFrontCamera(cam.label) ? '🤳' : '📷';
    const statusText = state === 'broken' ? 'BROKEN' : state === 'working' ? 'OK' : 'Tap to test';

    div.innerHTML = `
      <div class="cam-icon">${icon}</div>
      <div class="cam-info">
        <div class="cam-name">${getDisplayName(cam)}</div>
        <div class="cam-label">${cam.label || 'Unknown'}</div>
      </div>
      <span class="cam-status">${statusText}</span>
    `;
    div.addEventListener('click', () => selectCameraForTest(i));
    cameraList.appendChild(div);
  });
}

async function selectCameraForTest(index) {
  selectedCamIdx = index;
  const cam = visibleCameras[index];
  const setupVideo = document.getElementById('setupVideo');
  const label = document.getElementById('setupPreviewLabel');

  if (setupStream) { setupStream.getTracks().forEach(t => t.stop()); setupStream = null; }

  label.textContent = 'Loading...';
  document.getElementById('setupMarkBtns').style.display = 'flex';

  try {
    setupStream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: { exact: cam.deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    setupVideo.srcObject = setupStream;
    setupVideo.classList.toggle('mirrored', isFrontCamera(cam.label));
    label.textContent = getDisplayName(cam);
  } catch {
    label.textContent = 'Could not access this camera';
  }
  renderCameraList();
}

function markCamera(state) {
  if (selectedCamIdx < 0) return;
  cameraStates[visibleCameras[selectedCamIdx].deviceId] = state;
  renderCameraList();
  updateDoneButton();
}

function updateDoneButton() {
  const allMarked = visibleCameras.every(c => cameraStates[c.deviceId] !== 'unknown');
  const hasWorking = visibleCameras.some(c => cameraStates[c.deviceId] === 'working');
  const doneBtn = document.getElementById('doneBtn');
  if (allMarked && hasWorking) {
    doneBtn.disabled = false; doneBtn.textContent = 'Start Camera';
  } else if (allMarked) {
    doneBtn.disabled = true; doneBtn.textContent = 'Mark at least one as working';
  } else {
    const rem = visibleCameras.filter(c => cameraStates[c.deviceId] === 'unknown').length;
    doneBtn.disabled = true; doneBtn.textContent = `${rem} camera(s) left to mark`;
  }
}

function finishSetup() {
  if (setupStream) { setupStream.getTracks().forEach(t => t.stop()); setupStream = null; }
  const config = {
    broken: visibleCameras.filter(c => cameraStates[c.deviceId] === 'broken').map(c => c.deviceId),
    working: visibleCameras.filter(c => cameraStates[c.deviceId] === 'working').map(c => c.deviceId),
    timestamp: Date.now()
  };
  saveConfig(config);
  launchCamera(config);
}

// ============ CAMERA ============
async function launchCamera(config) {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('cameraScreen').classList.add('active');
  document.getElementById('resetBtn').style.display = 'flex';

  if (allCameras.length === 0) {
    allCameras = await enumerateAllCameras();
    visibleCameras = getVisibleCameras(allCameras);
  }

  const workingIds = new Set(config.working);
  workingBackCameras = visibleCameras.filter(c => workingIds.has(c.deviceId) && !isFrontCamera(c.label));
  workingFrontCameras = visibleCameras.filter(c => workingIds.has(c.deviceId) && isFrontCamera(c.label));

  isFront = false;
  if (workingBackCameras.length === 0 && workingFrontCameras.length > 0) isFront = true;

  const startCam = workingBackCameras[0] || workingFrontCameras[0];
  if (startCam) await switchCamera(startCam.deviceId);

  buildLensButtons();
  updateFlashButton();
  updateTimerButton();
}

function buildLensButtons() {
  const lensRow = document.getElementById('lensRow');
  lensRow.innerHTML = '';
  const cameras = isFront ? workingFrontCameras : workingBackCameras;
  cameras.forEach(cam => {
    const btn = document.createElement('button');
    btn.className = 'lens-btn' + (cam.deviceId === activeDeviceId ? ' active' : '');
    btn.textContent = getLensBtnLabel(cam);
    btn.addEventListener('click', () => switchCamera(cam.deviceId));
    lensRow.appendChild(btn);
  });
}

async function switchCamera(deviceId) {
  if (deviceId === activeDeviceId) return;
  if (isRecording) stopRecording();
  if (currentStream) currentStream.getTracks().forEach(t => t.stop());

  flashEnabled = false;
  updateFlashButton();

  try {
    currentStream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: { exact: deviceId }, width: { ideal: 3840 }, height: { ideal: 2160 } },
      audio: true
    });

    const video = document.getElementById('video');
    video.srcObject = currentStream;
    activeDeviceId = deviceId;
    video.classList.toggle('mirrored', isFront);

    document.getElementById('flashBtn').style.display = (isFront || isVideoMode) ? 'none' : 'flex';
    buildLensButtons();
  } catch {
    showToast('Could not access this camera');
  }
}

// ============ SHUTTER / RECORD ============
document.getElementById('shutterBtn').addEventListener('click', () => {
  if (isVideoMode) {
    isRecording ? stopRecording() : startRecording();
  } else {
    if (timerMode === 0) {
      takePhoto();
    } else {
      startTimerThenPhoto();
    }
  }
});

function startTimerThenPhoto() {
  let count = timerMode;
  const indicator = document.getElementById('timerIndicator');
  indicator.textContent = count;
  indicator.classList.add('active');
  document.getElementById('shutterBtn').disabled = true;

  timerTimeout = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(timerTimeout);
      indicator.classList.remove('active');
      document.getElementById('shutterBtn').disabled = false;
      takePhoto();
    } else {
      indicator.textContent = count;
    }
  }, 1000);
}

function takePhoto() {
  const track = currentStream?.getVideoTracks()[0];
  if (!track) return;

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const settings = track.getSettings();
  canvas.width = settings.width || video.videoWidth;
  canvas.height = settings.height || video.videoHeight;

  const ctx = canvas.getContext('2d');
  if (isFront) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  if (isFront) ctx.setTransform(1, 0, 0, 1, 0, 0);

  document.getElementById('flash').classList.add('active');
  setTimeout(() => document.getElementById('flash').classList.remove('active'), 150);

  canvas.toBlob(blob => {
    if (!blob) return;
    currentBlob = blob;
    currentVideoBlob = null;
    const container = document.getElementById('previewContainer');
    container.innerHTML = '<img id="previewImg" src="" alt="Photo">';
    document.getElementById('previewImg').src = URL.createObjectURL(blob);
    document.getElementById('preview').classList.add('active');
  }, 'image/jpeg', 0.95);
}

function startRecording() {
  if (!currentStream) return;
  recordedChunks = [];
  recSeconds = 0;

  const options = MediaRecorder.isTypeSupported('video/mp4') ? { mimeType: 'video/mp4' } :
                  MediaRecorder.isTypeSupported('video/webm') ? { mimeType: 'video/webm' } : {};

  try {
    mediaRecorder = new MediaRecorder(currentStream, options);
  } catch {
    showToast('Video recording not supported');
    return;
  }

  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/mp4' });
    currentVideoBlob = blob;
    currentBlob = null;
    const container = document.getElementById('previewContainer');
    container.innerHTML = '<video id="previewVid" controls playsinline style="max-width:100%;max-height:100%;border-radius:8px"></video>';
    document.getElementById('previewVid').src = URL.createObjectURL(blob);
    document.getElementById('preview').classList.add('active');
  };

  mediaRecorder.start(100);
  isRecording = true;
  document.getElementById('shutterBtn').classList.add('recording');

  recInterval = setInterval(() => {
    recSeconds++;
    const m = Math.floor(recSeconds / 60);
    const s = recSeconds % 60;
    document.getElementById('recTime').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);

  document.getElementById('recTimer').classList.add('active');
}

function stopRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    clearInterval(recInterval);
    document.getElementById('shutterBtn').classList.remove('recording');
    document.getElementById('recTimer').classList.remove('active');
  }
}

// ============ SAVE / SHARE ============
function savePhoto() {
  if (currentVideoBlob) {
    const ext = currentVideoBlob.type.includes('mp4') ? 'mp4' : 'webm';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(currentVideoBlob);
    a.download = `video_${Date.now()}.${ext}`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    showToast('Video saved');
    return;
  }
  if (!currentBlob) return;
  if (navigator.share && navigator.canShare) {
    const file = new File([currentBlob], `photo_${Date.now()}.jpg`, { type: 'image/jpeg' });
    if (navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file] }).catch(() => fallbackSave());
      return;
    }
  }
  fallbackSave();
}

function fallbackSave() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(currentBlob);
  a.download = `photo_${Date.now()}.jpg`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast('Photo saved');
}

function sharePhoto() {
  const blob = currentVideoBlob || currentBlob;
  if (!blob) return;
  const ext = currentVideoBlob ? (currentVideoBlob.type.includes('mp4') ? 'mp4' : 'webm') : 'jpg';
  const type = currentVideoBlob ? currentVideoBlob.type : 'image/jpeg';
  const file = new File([blob], `media_${Date.now()}.${ext}`, { type });
  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({ files: [file] }).catch(() => {});
  } else {
    fallbackSave();
  }
}

// ============ EVENT LISTENERS ============
document.getElementById('markBroken').addEventListener('click', () => markCamera('broken'));
document.getElementById('markWorking').addEventListener('click', () => markCamera('working'));
document.getElementById('doneBtn').addEventListener('click', finishSetup);

function goToSettings() {
  if (isRecording) stopRecording();
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
  if (timerTimeout) clearInterval(timerTimeout);
  document.getElementById('timerIndicator').classList.remove('active');
  activeDeviceId = null; selectedCamIdx = -1; flashEnabled = false;
  clearConfig(); startSetup();
}

document.getElementById('resetBtn').addEventListener('click', goToSettings);
document.getElementById('settingsBtn').addEventListener('click', goToSettings);

document.getElementById('flipBtn').addEventListener('click', () => {
  if (isFront && workingBackCameras.length === 0) return;
  if (!isFront && workingFrontCameras.length === 0) return;
  isFront = !isFront;
  const cameras = isFront ? workingFrontCameras : workingBackCameras;
  if (cameras.length > 0) switchCamera(cameras[0].deviceId);
});

document.getElementById('closePreview').addEventListener('click', () => {
  document.getElementById('preview').classList.remove('active');
  currentBlob = null; currentVideoBlob = null;
});

document.getElementById('saveBtn').addEventListener('click', savePhoto);
document.getElementById('shareBtn').addEventListener('click', sharePhoto);

// ============ INIT ============
async function init() {
  const config = getSavedConfig();
  if (config && config.working && config.working.length > 0) {
    allCameras = await enumerateAllCameras();
    visibleCameras = getVisibleCameras(allCameras);
    const currentIds = new Set(allCameras.map(c => c.deviceId));
    if (config.working.every(id => currentIds.has(id))) {
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('resetBtn').style.display = 'flex';
      launchCamera(config);
      return;
    }
  }
  startSetup();
}

init();
</script>
