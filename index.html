<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BrokenLens">
<link rel="apple-touch-icon" href="cam-icon.png">
<link rel="manifest" href="manifest.json">
<title>BrokenLens</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @media screen and (orientation: landscape) {
    body::before {
      content: 'Rotate your phone to portrait mode 📱';
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #000; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 600; text-align: center; z-index: 9999; padding: 40px;
    }
    body > * { display: none !important; }
  }

  body {
    background: #000; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh; height: 100dvh;
    overflow: hidden; user-select: none; -webkit-user-select: none;
  }

  /* ======= SETUP SCREEN ======= */
  .setup-screen {
    height: 100%; display: flex; flex-direction: column;
    padding: 20px;
    padding-top: max(60px, env(safe-area-inset-top));
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }

  .setup-screen h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .setup-screen p { font-size: 15px; color: rgba(255,255,255,0.6); margin-bottom: 24px; line-height: 1.4; }
  .setup-step { font-size: 13px; color: #f5c518; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

  .camera-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

  .camera-item {
    display: flex; align-items: center; gap: 14px; padding: 16px;
    border-radius: 14px; border: 2px solid #333; background: #1a1a1a; cursor: pointer; transition: all 0.2s;
  }
  .camera-item.testing { border-color: #f5c518; background: rgba(245,197,24,0.08); }
  .camera-item.broken { border-color: #ff4444; background: rgba(255,68,68,0.08); }
  .camera-item.working { border-color: #44cc44; background: rgba(68,204,68,0.08); }
  .cam-icon { width: 44px; height: 44px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .camera-item.broken .cam-icon { background: rgba(255,68,68,0.2); }
  .camera-item.working .cam-icon { background: rgba(68,204,68,0.2); }
  .cam-info { flex: 1; min-width: 0; }
  .cam-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .cam-label { font-size: 12px; color: rgba(255,255,255,0.4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cam-status { font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .camera-item.broken .cam-status { color: #ff4444; }
  .camera-item.working .cam-status { color: #44cc44; }

  .setup-preview { width: 100%; height: 180px; border-radius: 14px; overflow: hidden; background: #111; margin-bottom: 16px; position: relative; }
  .setup-preview video { width: 100%; height: 100%; object-fit: cover; }
  .setup-preview video.mirrored { transform: scaleX(-1); }
  .setup-preview-label { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 10px; font-size: 12px; color: rgba(255,255,255,0.7); }

  .setup-actions { display: flex; gap: 10px; }
  .setup-btn { flex: 1; padding: 16px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
  .setup-btn:active { transform: scale(0.97); }
  .btn-broken { background: rgba(255,68,68,0.15); color: #ff6666; border: 2px solid #ff4444; }
  .btn-working { background: rgba(68,204,68,0.15); color: #66cc66; border: 2px solid #44cc44; }

  .btn-done { background: #f5c518; color: #000; padding: 16px; border-radius: 14px; border: none; font-size: 17px; font-weight: 700; cursor: pointer; width: 100%; transition: transform 0.1s; }
  .btn-done:active { transform: scale(0.97); }
  .btn-done:disabled { opacity: 0.3; }

  .btn-reset { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 13px; cursor: pointer; padding: 8px; margin-top: 8px; width: 100%; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; }

  /* ======= CAMERA SCREEN ======= */
  .camera-screen { height: 100%; display: none; flex-direction: column; background: #000; }
  .camera-screen.active { display: flex; }

  /* Viewfinder takes most of the screen */
  .viewfinder {
    flex: 1; position: relative; overflow: hidden; background: #000;
    border-radius: 0 0 20px 20px;
  }

  .viewfinder video { width: 100%; height: 100%; object-fit: cover; }
  .viewfinder video.mirrored { transform: scaleX(-1); }

  /* Grid */
  .grid-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 5; display: none; }
  .grid-overlay.active { display: block; }
  .grid-overlay svg { width: 100%; height: 100%; }
  .grid-overlay line { stroke: rgba(255,255,255,0.3); stroke-width: 1; }

  /* Top bar inside viewfinder — flash + top icons */
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: max(14px, env(safe-area-inset-top)) 16px 10px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 20;
  }

  /* Pill group like iPhone — flash + extra icons */
  .top-pill {
    display: flex; align-items: center; gap: 2px;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
    border-radius: 30px; padding: 6px 10px; gap: 8px;
    margin-left: auto;
  }

  .top-icon-btn {
    width: 32px; height: 32px; border: none; background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%;
  }

  .top-icon-btn.active { background: rgba(245,197,24,0.25); }
  .top-icon-btn svg { width: 20px; height: 20px; }

  /* Timer countdown */
  .timer-indicator {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.6); color: #f5c518;
    font-size: 72px; font-weight: 700; border-radius: 20px;
    padding: 10px 30px; display: none; align-items: center; justify-content: center; z-index: 50;
  }
  .timer-indicator.active { display: flex; }

  /* Rec timer */
  .rec-timer { position: absolute; top: max(14px, env(safe-area-inset-top)); left: 16px; background: rgba(255,0,0,0.8); color: #fff; font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 10px; display: none; align-items: center; gap: 6px; z-index: 20; }
  .rec-timer.active { display: flex; }
  .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Focus ring */
  .focus-ring { position: absolute; width: 60px; height: 60px; border: 2px solid #f5c518; border-radius: 50%; pointer-events: none; z-index: 15; display: none; transform: translate(-50%, -50%); animation: focusPulse 0.4s ease-out forwards; }
  @keyframes focusPulse { 0% { transform: translate(-50%, -50%) scale(1.4); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } }

  /* Exposure bar — appears on right side when active */
  .exp-bar {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    display: none; flex-direction: column; align-items: center; gap: 8px; z-index: 20;
  }
  .exp-bar.active { display: flex; }
  .exp-label { font-size: 11px; color: #f5c518; font-weight: 700; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 6px; }
  .exp-track { width: 4px; height: 130px; background: rgba(255,255,255,0.2); border-radius: 2px; position: relative; pointer-events: all; cursor: pointer; }
  .exp-thumb { position: absolute; left: 50%; width: 18px; height: 18px; border-radius: 50%; background: #f5c518; border: 2px solid #000; box-shadow: 0 0 6px rgba(0,0,0,0.5); transform: translateX(-50%) translateY(50%); bottom: 50%; }

  /* Lock badge */
  .lock-badge {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.65); color: rgba(255,255,255,0.8);
    font-size: 12px; padding: 6px 14px; border-radius: 14px;
    display: none; align-items: center; gap: 6px; z-index: 30; white-space: nowrap;
  }
  .lock-badge.active { display: flex; }

  /* ---- BOTTOM CONTROLS ---- */
  .controls {
    background: #000;
    padding: 12px 0;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    display: flex; flex-direction: column; gap: 10px;
  }

  /* Mode selector: VIDEO / PHOTO like iPhone */
  .mode-row { display: flex; justify-content: center; gap: 4px; }
  .mode-btn { padding: 6px 18px; border-radius: 20px; border: none; background: transparent; color: rgba(255,255,255,0.4); font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; text-transform: uppercase; }
  .mode-btn.active { background: rgba(255,255,255,0.15); color: #f5c518; }

  /* Lens buttons */
  .lens-row { display: flex; justify-content: center; gap: 10px; }
  .lens-btn { width: 52px; height: 52px; border-radius: 50%; border: none; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
  .lens-btn.active { background: rgba(0,0,0,0.6); color: #f5c518; border: 1.5px solid rgba(245,197,24,0.5); }

  /* Main action row */
  .action-row { display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }

  .side-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .side-btn svg { width: 28px; height: 28px; }

  .shutter-btn { width: 76px; height: 76px; border-radius: 50%; border: 3px solid #fff; background: transparent; cursor: pointer; position: relative; transition: all 0.15s; }
  .shutter-btn::after { content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; border-radius: 50%; background: #fff; transition: all 0.15s; }
  .shutter-btn:active::after { transform: scale(0.88); }
  .shutter-btn.video-mode { border-color: #ff4444; }
  .shutter-btn.video-mode::after { background: #ff4444; }
  .shutter-btn.recording::after { background: #ff4444; border-radius: 6px; width: 28px; height: 28px; top: 50%; left: 50%; transform: translate(-50%,-50%); }

  /* Ratio row */
  .ratio-row { display: flex; justify-content: center; gap: 8px; }
  .ratio-btn { padding: 4px 12px; border-radius: 14px; border: 1.5px solid rgba(255,255,255,0.25); background: transparent; color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .ratio-btn.active { border-color: #f5c518; color: #f5c518; background: rgba(245,197,24,0.08); }

  /* Flash overlay */
  .flash { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 100; transition: opacity 0.05s; }
  .flash.active { opacity: 0.8; }

  /* Preview */
  .preview-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.97); z-index: 200; display: none; flex-direction: column; }
  .preview-overlay.active { display: flex; }
  .preview-top { display: flex; justify-content: flex-end; padding: 16px; padding-top: max(16px, env(safe-area-inset-top)); }
  .close-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(255,255,255,0.2); color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .preview-image-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .preview-image-container img, .preview-image-container video { max-width: 100%; max-height: 100%; border-radius: 8px; }
  .preview-bottom { display: flex; justify-content: center; gap: 12px; padding: 16px; padding-bottom: max(16px, env(safe-area-inset-bottom)); }
  .save-btn { display: flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: 50px; border: none; background: #f5c518; color: #000; font-size: 16px; font-weight: 600; cursor: pointer; }
  .save-btn svg { width: 20px; height: 20px; fill: #000; }
  .share-btn { display: flex; align-items: center; gap: 8px; padding: 14px 20px; border-radius: 50px; border: 2px solid #555; background: transparent; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
  .share-btn svg { width: 20px; height: 20px; fill: #fff; }

  .toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: rgba(50,50,50,0.95); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- SETUP -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-step">Step 1 of 2</div>
  <h1>Which lens is broken?</h1>
  <p>Tap each camera to preview it. Mark the broken one(s) so we can skip them.</p>
  <div class="setup-preview">
    <video id="setupVideo" autoplay playsinline muted></video>
    <div class="setup-preview-label" id="setupPreviewLabel">Tap a camera to preview</div>
  </div>
  <div class="camera-list" id="cameraList"></div>
  <div class="setup-actions" id="setupMarkBtns" style="display:none; margin-bottom:12px">
    <button class="setup-btn btn-broken" id="markBroken">Broken</button>
    <button class="setup-btn btn-working" id="markWorking">Working</button>
  </div>
  <button class="btn-done" id="doneBtn" disabled>Start Camera</button>
  <button class="btn-reset" id="resetBtn" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    Settings
  </button>
</div>

<!-- CAMERA -->
<div class="camera-screen" id="cameraScreen">

  <!-- Viewfinder fills most of screen -->
  <div class="viewfinder" id="viewfinder">
    <video id="video" autoplay playsinline muted></video>

    <div class="grid-overlay" id="gridOverlay">
      <svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="33.33" y1="0" x2="33.33" y2="100"/>
        <line x1="66.66" y1="0" x2="66.66" y2="100"/>
        <line x1="0" y1="33.33" x2="100" y2="33.33"/>
        <line x1="0" y1="66.66" x2="100" y2="66.66"/>
      </svg>
    </div>

    <div class="focus-ring" id="focusRing"></div>

    <!-- Exposure bar -->
    <div class="exp-bar" id="expBar">
      <div class="exp-label" id="expLabel">0</div>
      <div class="exp-track" id="expTrack">
        <div class="exp-thumb" id="expThumb"></div>
      </div>
    </div>

    <!-- Top bar: flash + icons pill -->
    <div class="top-bar">
      <div class="rec-timer" id="recTimer" style="position:relative;top:auto;left:auto">
        <div class="rec-dot"></div><span id="recTime">0:00</span>
      </div>
      <div class="top-pill">
        <!-- Flash -->
        <button class="top-icon-btn" id="flashBtn">
          <svg id="flashIcon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z" fill="#fff" stroke="none"/>
            <line id="flashOffLine" x1="3" y1="3" x2="21" y2="21" stroke="#fff" stroke-width="2.5"/>
          </svg>
        </button>
        <!-- Grid -->
        <button class="top-icon-btn" id="gridBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <path d="M8 3v18M16 3v18M3 8h18M3 16h18"/>
          </svg>
        </button>
        <!-- Timer -->
        <button class="top-icon-btn" id="timerBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2M12 5V3M10 3h4"/>
          </svg>
        </button>
        <!-- Exposure -->
        <button class="top-icon-btn" id="expBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
        </button>
        <!-- Lock -->
        <button class="top-icon-btn" id="lockBtn">
          <svg id="lockIcon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
            <rect x="5" y="11" width="14" height="11" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="timer-indicator" id="timerIndicator">3</div>
    <div class="lock-badge" id="lockBadge">🔒 Tap lock icon to unlock</div>
  </div>

  <!-- Bottom controls -->
  <div class="controls">
    <!-- Ratio row -->
    <div class="ratio-row">
      <button class="ratio-btn active" id="ratio43">4:3</button>
      <button class="ratio-btn" id="ratio169">16:9</button>
      <button class="ratio-btn" id="ratio11">1:1</button>
    </div>

    <!-- Lens buttons -->
    <div class="lens-row" id="lensRow"></div>

    <!-- Mode row -->
    <div class="mode-row">
      <button class="mode-btn" id="videoModeBtn">Video</button>
      <button class="mode-btn active" id="photoModeBtn">Photo</button>
    </div>

    <!-- Action row: flip | shutter | settings -->
    <div class="action-row">
      <button class="side-btn" id="flipBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
          <path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
      <button class="shutter-btn" id="shutterBtn"></button>
      <button class="side-btn" id="settingsBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="flash" id="flash"></div>

<!-- PREVIEW -->
<div class="preview-overlay" id="preview">
  <div class="preview-top"><button class="close-btn" id="closePreview">&times;</button></div>
  <div class="preview-image-container" id="previewContainer">
    <img id="previewImg" src="" alt="Photo">
  </div>
  <div class="preview-bottom">
    <button class="save-btn" id="saveBtn">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>Save
    </button>
    <button class="share-btn" id="shareBtn">
      <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>Share
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
const STORAGE_KEY = 'brokenlens_config';
const ALLOWED_BACK_INDICES = [0, 2, 5];
const BACK_CAMERA_NAMES = { 0: 'Main (1x)', 2: 'Wide (0.5x)', 5: 'Tele (3x)' };
const LENS_BTN_LABELS = { 0: '1x', 2: '0.5x', 5: '3x' };

let allCameras = [], visibleCameras = [];
let setupStream = null, selectedCamIdx = -1, cameraStates = {};
let currentStream = null, currentBlob = null, currentVideoBlob = null;
let activeDeviceId = null, isFront = false;
let workingBackCameras = [], workingFrontCameras = [];
let flashEnabled = false, gridEnabled = false;
let timerMode = 0, timerTimeout = null;
let isVideoMode = false, mediaRecorder = null;
let recordedChunks = [], isRecording = false, recInterval = null, recSeconds = 0;
let exposureValue = 0, expVisible = false;
let isLocked = false;
let aspectRatio = '4:3';
let burstInterval = null, isBursting = false;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function getSavedConfig() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } }
function saveConfig(c) { localStorage.setItem(STORAGE_KEY, JSON.stringify(c)); }
function clearConfig() { localStorage.removeItem(STORAGE_KEY); }

function isFrontCamera(label) {
  const l = (label || '').toLowerCase();
  return l.includes('front') || l.includes('facetime') || l.includes('user') || l.includes('truedepth');
}

function getVisibleCameras(all) {
  const front = all.filter(c => isFrontCamera(c.label));
  const back = all.filter(c => !isFrontCamera(c.label));
  return [...front, ...ALLOWED_BACK_INDICES.map(i => back[i]).filter(Boolean)];
}

function getDisplayName(cam) {
  if (isFrontCamera(cam.label)) return 'Front Camera';
  const allBack = allCameras.filter(c => !isFrontCamera(c.label));
  return BACK_CAMERA_NAMES[allBack.indexOf(cam)] || 'Back Camera';
}

function getLensBtnLabel(cam) {
  if (isFrontCamera(cam.label)) return 'Front';
  const allBack = allCameras.filter(c => !isFrontCamera(c.label));
  return LENS_BTN_LABELS[allBack.indexOf(cam)] || 'Back';
}

async function enumerateAllCameras() {
  try { const s = await navigator.mediaDevices.getUserMedia({ video: true }); s.getTracks().forEach(t => t.stop()); } catch { return []; }
  return (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === 'videoinput');
}

// ===== FLASH =====
function updateFlashUI() {
  const btn = document.getElementById('flashBtn');
  const line = document.getElementById('flashOffLine');
  btn.classList.toggle('active', flashEnabled);
  if (line) line.style.display = flashEnabled ? 'none' : 'block';
}

async function applyTorch(on) {
  if (!currentStream) return;
  const track = currentStream.getVideoTracks()[0];
  if (!track) return;
  const caps = track.getCapabilities();
  if (!caps.torch) return;
  try { await track.applyConstraints({ advanced: [{ torch: on }] }); } catch {}
}

document.getElementById('flashBtn').addEventListener('click', () => {
  if (isLocked) return;
  flashEnabled = !flashEnabled;
  updateFlashUI();
  applyTorch(flashEnabled);
});

// ===== GRID =====
document.getElementById('gridBtn').addEventListener('click', () => {
  if (isLocked) return;
  gridEnabled = !gridEnabled;
  document.getElementById('gridOverlay').classList.toggle('active', gridEnabled);
  document.getElementById('gridBtn').classList.toggle('active', gridEnabled);
});

// ===== TIMER =====
const timerCycle = [0, 3, 10];
const timerLabels = ['Timer: Off', 'Timer: 3s', 'Timer: 10s'];

document.getElementById('timerBtn').addEventListener('click', () => {
  if (isLocked) return;
  const idx = timerCycle.indexOf(timerMode);
  timerMode = timerCycle[(idx + 1) % timerCycle.length];
  document.getElementById('timerBtn').classList.toggle('active', timerMode !== 0);
  showToast(timerLabels[timerCycle.indexOf(timerMode)]);
});

// ===== EXPOSURE =====
document.getElementById('expBtn').addEventListener('click', () => {
  if (isLocked) return;
  expVisible = !expVisible;
  document.getElementById('expBar').classList.toggle('active', expVisible);
  document.getElementById('expBtn').classList.toggle('active', expVisible);
});

function setExposure(val) {
  exposureValue = Math.max(-2, Math.min(2, val));
  const pct = ((exposureValue + 2) / 4) * 100;
  const thumb = document.getElementById('expThumb');
  thumb.style.bottom = pct + '%';
  thumb.style.transform = 'translateX(-50%) translateY(50%)';
  document.getElementById('expLabel').textContent = exposureValue >= 0 ? '+' + exposureValue.toFixed(1) : exposureValue.toFixed(1);
  applyExposure();
}

async function applyExposure() {
  if (!currentStream) return;
  const track = currentStream.getVideoTracks()[0];
  if (!track) return;
  const caps = track.getCapabilities();
  if (caps.exposureCompensation) {
    try {
      const { min, max } = caps.exposureCompensation;
      await track.applyConstraints({ advanced: [{ exposureCompensation: min + ((exposureValue + 2) / 4) * (max - min) }] });
    } catch {}
  } else {
    document.getElementById('video').style.filter = `brightness(${1 + exposureValue * 0.3})`;
  }
}

let expDragging = false;
const expTrack = document.getElementById('expTrack');
expTrack.addEventListener('touchstart', e => { expDragging = true; handleExpDrag(e.touches[0]); }, { passive: true });
expTrack.addEventListener('touchmove', e => { if (expDragging) { handleExpDrag(e.touches[0]); e.stopPropagation(); } }, { passive: true });
expTrack.addEventListener('touchend', () => expDragging = false);
expTrack.addEventListener('mousedown', e => { expDragging = true; handleExpDrag(e); });
window.addEventListener('mousemove', e => { if (expDragging) handleExpDrag(e); });
window.addEventListener('mouseup', () => expDragging = false);

function handleExpDrag(e) {
  const rect = expTrack.getBoundingClientRect();
  setExposure(((1 - Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height))) * 4) - 2);
}

// ===== LOCK =====
document.getElementById('lockBtn').addEventListener('click', () => {
  isLocked = !isLocked;
  document.getElementById('lockBadge').classList.toggle('active', isLocked);
  document.getElementById('lockBtn').classList.toggle('active', isLocked);
  // Change lock icon to show locked/unlocked state
  document.getElementById('lockIcon').innerHTML = isLocked
    ? '<rect x="5" y="11" width="14" height="11" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>'  // locked
    : '<rect x="5" y="11" width="14" height="11" rx="2"/><path d="M8 11V7a4 4 0 0 1 7-3.87"/>';  // unlocked
  showToast(isLocked ? '🔒 Screen locked' : '🔓 Screen unlocked');
});

// ===== TAP TO FOCUS =====
document.getElementById('viewfinder').addEventListener('click', e => {
  if (e.target.closest('button') || e.target.closest('.exp-bar')) return;
  if (isLocked) return;
  const ring = document.getElementById('focusRing');
  ring.style.left = e.clientX + 'px';
  ring.style.top = e.clientY + 'px';
  ring.style.display = 'block';
  ring.style.animation = 'none';
  void ring.offsetWidth;
  ring.style.animation = 'focusPulse 0.4s ease-out forwards';
  setTimeout(() => ring.style.display = 'none', 800);
  if (!currentStream) return;
  const track = currentStream.getVideoTracks()[0];
  if (!track) return;
  const caps = track.getCapabilities();
  if (caps.focusMode?.includes('manual')) {
    const rect = document.getElementById('viewfinder').getBoundingClientRect();
    try { track.applyConstraints({ advanced: [{ focusMode: 'manual', pointsOfInterest: [{ x: (e.clientX - rect.left) / rect.width, y: (e.clientY - rect.top) / rect.height }] }] }); } catch {}
  }
});

// ===== ASPECT RATIO =====
function setAspectRatio(ratio) {
  aspectRatio = ratio;
  document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('ratio43').classList.toggle('active', ratio === '4:3');
  document.getElementById('ratio169').classList.toggle('active', ratio === '16:9');
  document.getElementById('ratio11').classList.toggle('active', ratio === '1:1');
}
document.getElementById('ratio43').addEventListener('click', () => setAspectRatio('4:3'));
document.getElementById('ratio169').addEventListener('click', () => setAspectRatio('16:9'));
document.getElementById('ratio11').addEventListener('click', () => setAspectRatio('1:1'));

// ===== MODE =====
document.getElementById('photoModeBtn').addEventListener('click', () => {
  if (isRecording || isLocked) return;
  isVideoMode = false;
  document.getElementById('photoModeBtn').classList.add('active');
  document.getElementById('videoModeBtn').classList.remove('active');
  document.getElementById('shutterBtn').classList.remove('video-mode');
  document.getElementById('flashBtn').closest('.top-pill').style.display = '';
});

document.getElementById('videoModeBtn').addEventListener('click', () => {
  if (isRecording || isLocked) return;
  isVideoMode = true;
  document.getElementById('videoModeBtn').classList.add('active');
  document.getElementById('photoModeBtn').classList.remove('active');
  document.getElementById('shutterBtn').classList.add('video-mode');
});

// ===== SETUP =====
async function startSetup() {
  document.getElementById('setupScreen').style.display = 'flex';
  document.getElementById('cameraScreen').classList.remove('active');
  allCameras = await enumerateAllCameras();
  if (allCameras.length === 0) {
    document.getElementById('cameraList').innerHTML = '<p style="text-align:center;color:#ff4444;padding:40px">No cameras detected.</p>';
    return;
  }
  visibleCameras = getVisibleCameras(allCameras);
  cameraStates = {};
  visibleCameras.forEach(c => cameraStates[c.deviceId] = 'unknown');
  renderCameraList(); updateDoneButton();
}

function renderCameraList() {
  const list = document.getElementById('cameraList');
  list.innerHTML = '';
  visibleCameras.forEach((cam, i) => {
    const state = cameraStates[cam.deviceId];
    const div = document.createElement('div');
    div.className = 'camera-item' + (selectedCamIdx === i ? ' testing' : '') + (state === 'broken' ? ' broken' : '') + (state === 'working' ? ' working' : '');
    div.innerHTML = `<div class="cam-icon">${isFrontCamera(cam.label) ? '🤳' : '📷'}</div><div class="cam-info"><div class="cam-name">${getDisplayName(cam)}</div><div class="cam-label">${cam.label || 'Unknown'}</div></div><span class="cam-status">${state === 'broken' ? 'BROKEN' : state === 'working' ? 'OK' : 'Tap to test'}</span>`;
    div.addEventListener('click', () => selectCameraForTest(i));
    list.appendChild(div);
  });
}

async function selectCameraForTest(index) {
  selectedCamIdx = index;
  const cam = visibleCameras[index];
  const setupVideo = document.getElementById('setupVideo');
  if (setupStream) { setupStream.getTracks().forEach(t => t.stop()); setupStream = null; }
  document.getElementById('setupPreviewLabel').textContent = 'Loading...';
  document.getElementById('setupMarkBtns').style.display = 'flex';
  try {
    setupStream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: cam.deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false });
    setupVideo.srcObject = setupStream;
    setupVideo.classList.toggle('mirrored', isFrontCamera(cam.label));
    document.getElementById('setupPreviewLabel').textContent = getDisplayName(cam);
  } catch { document.getElementById('setupPreviewLabel').textContent = 'Could not access this camera'; }
  renderCameraList();
}

function markCamera(state) {
  if (selectedCamIdx < 0) return;
  cameraStates[visibleCameras[selectedCamIdx].deviceId] = state;
  renderCameraList(); updateDoneButton();
}

function updateDoneButton() {
  const allMarked = visibleCameras.every(c => cameraStates[c.deviceId] !== 'unknown');
  const hasWorking = visibleCameras.some(c => cameraStates[c.deviceId] === 'working');
  const btn = document.getElementById('doneBtn');
  if (allMarked && hasWorking) { btn.disabled = false; btn.textContent = 'Start Camera'; }
  else if (allMarked) { btn.disabled = true; btn.textContent = 'Mark at least one as working'; }
  else { btn.disabled = true; btn.textContent = `${visibleCameras.filter(c => cameraStates[c.deviceId] === 'unknown').length} camera(s) left to mark`; }
}

function finishSetup() {
  if (setupStream) { setupStream.getTracks().forEach(t => t.stop()); setupStream = null; }
  const config = {
    broken: visibleCameras.filter(c => cameraStates[c.deviceId] === 'broken').map(c => c.deviceId),
    working: visibleCameras.filter(c => cameraStates[c.deviceId] === 'working').map(c => c.deviceId),
    timestamp: Date.now()
  };
  saveConfig(config); launchCamera(config);
}

// ===== CAMERA =====
async function launchCamera(config) {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('cameraScreen').classList.add('active');
  document.getElementById('resetBtn').style.display = 'flex';
  if (allCameras.length === 0) { allCameras = await enumerateAllCameras(); visibleCameras = getVisibleCameras(allCameras); }
  const workingIds = new Set(config.working);
  workingBackCameras = visibleCameras.filter(c => workingIds.has(c.deviceId) && !isFrontCamera(c.label));
  workingFrontCameras = visibleCameras.filter(c => workingIds.has(c.deviceId) && isFrontCamera(c.label));
  isFront = workingBackCameras.length === 0 && workingFrontCameras.length > 0;
  const startCam = workingBackCameras[0] || workingFrontCameras[0];
  if (startCam) await switchCamera(startCam.deviceId);
  buildLensButtons(); updateFlashUI();
}

function buildLensButtons() {
  const row = document.getElementById('lensRow');
  row.innerHTML = '';
  (isFront ? workingFrontCameras : workingBackCameras).forEach(cam => {
    const btn = document.createElement('button');
    btn.className = 'lens-btn' + (cam.deviceId === activeDeviceId ? ' active' : '');
    btn.textContent = getLensBtnLabel(cam);
    btn.addEventListener('click', () => { if (!isLocked) switchCamera(cam.deviceId); });
    row.appendChild(btn);
  });
}

async function switchCamera(deviceId) {
  if (deviceId === activeDeviceId) return;
  if (isRecording) stopRecording();
  if (currentStream) currentStream.getTracks().forEach(t => t.stop());
  flashEnabled = false; updateFlashUI();
  try {
    currentStream = await navigator.mediaDevices.getUserMedia({
      video: { deviceId: { exact: deviceId }, width: { ideal: 3840 }, height: { ideal: 2160 }, frameRate: { ideal: 60 } },
      audio: true
    });
    const video = document.getElementById('video');
    video.srcObject = currentStream;
    video.style.filter = '';
    activeDeviceId = deviceId;
    video.classList.toggle('mirrored', isFront);
    document.getElementById('flashBtn').style.display = isFront ? 'none' : '';
    exposureValue = 0;
    buildLensButtons();
  } catch { showToast('Could not access this camera'); }
}

// ===== SHUTTER =====
const shutterBtn = document.getElementById('shutterBtn');

shutterBtn.addEventListener('click', () => {
  if (isLocked) return;
  if (isVideoMode) { isRecording ? stopRecording() : startRecording(); return; }
  timerMode === 0 ? takePhoto() : startTimerThenPhoto();
});

// Burst: hold shutter
shutterBtn.addEventListener('touchstart', () => {
  if (isLocked || isVideoMode) return;
  burstInterval = setTimeout(() => {
    isBursting = true;
    showToast('Burst — release to stop');
    burstInterval = setInterval(takePhoto, 280);
  }, 700);
}, { passive: true });

shutterBtn.addEventListener('touchend', () => {
  clearTimeout(burstInterval);
  if (isBursting) { clearInterval(burstInterval); isBursting = false; showToast('Burst done'); }
});

function startTimerThenPhoto() {
  let count = timerMode;
  const ind = document.getElementById('timerIndicator');
  ind.textContent = count; ind.classList.add('active');
  shutterBtn.disabled = true;
  timerTimeout = setInterval(() => {
    count--;
    if (count <= 0) { clearInterval(timerTimeout); ind.classList.remove('active'); shutterBtn.disabled = false; takePhoto(); }
    else ind.textContent = count;
  }, 1000);
}

function takePhoto() {
  const track = currentStream?.getVideoTracks()[0];
  if (!track) return;
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const settings = track.getSettings();
  let w = settings.width || video.videoWidth;
  let h = settings.height || video.videoHeight;

  if (aspectRatio === '1:1') { const s = Math.min(w, h); canvas.width = s; canvas.height = s; }
  else if (aspectRatio === '16:9') { canvas.width = w; canvas.height = Math.round(w * 9 / 16); }
  else { canvas.width = w; canvas.height = h; }

  const ctx = canvas.getContext('2d');
  if (isFront) { ctx.translate(canvas.width, 0); ctx.scale(-1, 1); }
  const srcX = aspectRatio === '1:1' ? (w - canvas.width) / 2 : 0;
  const srcY = (aspectRatio === '16:9' || aspectRatio === '1:1') ? (h - canvas.height) / 2 : 0;
  ctx.drawImage(video, srcX, srcY, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);
  if (isFront) ctx.setTransform(1, 0, 0, 1, 0, 0);

  if (!isBursting) {
    document.getElementById('flash').classList.add('active');
    setTimeout(() => document.getElementById('flash').classList.remove('active'), 150);
  }

  canvas.toBlob(blob => {
    if (!blob || isBursting) return;
    currentBlob = blob; currentVideoBlob = null;
    document.getElementById('previewContainer').innerHTML = '<img id="previewImg" src="" alt="Photo">';
    document.getElementById('previewImg').src = URL.createObjectURL(blob);
    document.getElementById('preview').classList.add('active');
  }, 'image/jpeg', 0.97);
}

// ===== VIDEO =====
function startRecording() {
  if (!currentStream) return;
  recordedChunks = []; recSeconds = 0;
  const mimeType =
    MediaRecorder.isTypeSupported('video/mp4;codecs=h264,aac') ? 'video/mp4;codecs=h264,aac' :
    MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' :
    MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
  try { mediaRecorder = new MediaRecorder(currentStream, { mimeType, videoBitsPerSecond: 8000000 }); }
  catch { showToast('Video not supported'); return; }
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/mp4' });
    currentVideoBlob = blob; currentBlob = null;
    document.getElementById('previewContainer').innerHTML = '<video id="previewVid" controls playsinline style="max-width:100%;max-height:100%;border-radius:8px"></video>';
    document.getElementById('previewVid').src = URL.createObjectURL(blob);
    document.getElementById('preview').classList.add('active');
  };
  mediaRecorder.start(100); isRecording = true;
  shutterBtn.classList.add('recording');
  recInterval = setInterval(() => {
    recSeconds++;
    document.getElementById('recTime').textContent = `${Math.floor(recSeconds/60)}:${(recSeconds%60).toString().padStart(2,'0')}`;
  }, 1000);
  document.getElementById('recTimer').classList.add('active');
}

function stopRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop(); isRecording = false;
    clearInterval(recInterval);
    shutterBtn.classList.remove('recording');
    document.getElementById('recTimer').classList.remove('active');
  }
}

// ===== SAVE / SHARE =====
document.getElementById('saveBtn').addEventListener('click', () => {
  const blob = currentVideoBlob || currentBlob;
  if (!blob) return;
  const ext = currentVideoBlob ? (currentVideoBlob.type.includes('mp4') ? 'mp4' : 'webm') : 'jpg';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `brokenlens_${Date.now()}.${ext}`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast(ext === 'jpg' ? 'Photo saved' : 'Video saved');
});

document.getElementById('shareBtn').addEventListener('click', () => {
  const blob = currentVideoBlob || currentBlob;
  if (!blob) return;
  const ext = currentVideoBlob ? (currentVideoBlob.type.includes('mp4') ? 'mp4' : 'webm') : 'jpg';
  const file = new File([blob], `brokenlens_${Date.now()}.${ext}`, { type: blob.type });
  if (navigator.share && navigator.canShare?.({ files: [file] })) {
    navigator.share({ files: [file] }).catch(() => {});
  } else showToast('Sharing not supported on this browser');
});

// ===== EVENTS =====
document.getElementById('markBroken').addEventListener('click', () => markCamera('broken'));
document.getElementById('markWorking').addEventListener('click', () => markCamera('working'));
document.getElementById('doneBtn').addEventListener('click', finishSetup);

function goToSettings() {
  if (isRecording) stopRecording();
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
  if (timerTimeout) clearInterval(timerTimeout);
  document.getElementById('timerIndicator').classList.remove('active');
  activeDeviceId = null; selectedCamIdx = -1; flashEnabled = false; isLocked = false;
  document.getElementById('lockBadge').classList.remove('active');
  clearConfig(); startSetup();
}

document.getElementById('resetBtn').addEventListener('click', goToSettings);
document.getElementById('settingsBtn').addEventListener('click', goToSettings);

document.getElementById('flipBtn').addEventListener('click', () => {
  if (isLocked) return;
  if (isFront && workingBackCameras.length === 0) return;
  if (!isFront && workingFrontCameras.length === 0) return;
  isFront = !isFront;
  const cams = isFront ? workingFrontCameras : workingBackCameras;
  if (cams.length > 0) switchCamera(cams[0].deviceId);
});

document.getElementById('closePreview').addEventListener('click', () => {
  document.getElementById('preview').classList.remove('active');
  currentBlob = null; currentVideoBlob = null;
});

// ===== INIT =====
async function init() {
  const config = getSavedConfig();
  if (config?.working?.length > 0) {
    allCameras = await enumerateAllCameras();
    visibleCameras = getVisibleCameras(allCameras);
    const ids = new Set(allCameras.map(c => c.deviceId));
    if (config.working.every(id => ids.has(id))) {
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('resetBtn').style.display = 'flex';
      launchCamera(config); return;
    }
  }
  startSetup();
}

init();
</script>
